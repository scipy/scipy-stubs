name: CI
permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_LOCKED: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          python-version: "3.14"
          activate-environment: true

      # the `scientific-python/repo-review` action (v1.0.3) internally uses an unpinned
      # `actions/setup-python@v6`, so we use `uvx` instead.
      - name: repo-review
        run: >
          uvx --from='repo-review[cli]' --with=sp-repo-review
          repo-review --format html --stderr rich .
          >> $GITHUB_STEP_SUMMARY

      - name: dprint
        uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3

      - name: typos
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

      - name: ruff check
        run: uv run ruff check --output-format=github

      - name: ruff format
        run: uv run ruff format --check

      # mypy_primer expects pyright to pass
      - name: pyright
        uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef # v3.0.2

  validate_stubs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: setup uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          python-version: "3.14"

      - name: pyrefly coverage check
        run: uv run pyrefly coverage check --public-only --fail-under=99.9 scipy-stubs

      - name: check for unstubbed modules
        run: uv run scripts/unstubbed_modules.py

      # avoid stubdefaulter checking the tests as if they were stubs
      - name: exclude tests
        run: rm -rf tests

      - name: run stubdefaulter
        run: uv run stubdefaulter --check --exit-zero --packages .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        py: ["3.12"]
        np: ["2.0", "2.1", "2.2", "2.3", "2.4", "2.5"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # NOTE: mypy ignores `uv run --with=...` (and `--isolated` does not help), so we
      # manually (re)install the desired version directly in the environment.

      - name: setup uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          activate-environment: true
          python-version: ${{ matrix.py }}

      - name: install dependencies
        run: uv pip install --exact --group type numpy==${{ matrix.np }}.* .

      - name: ty check
        run: ty check --output-format=github --error-on-warning scipy-stubs scripts

      - name: pyrefly check
        run: pyrefly check --output-format=github scipy-stubs scripts

      - name: zuban check
        run: zuban check scipy-stubs scripts

      - name: mypy
        run: mypy --cache-dir=/dev/null scipy-stubs

      - name: basedpyright
        run: basedpyright scipy-stubs scripts

      - name: stubtest
        run: stubtest --ignore-disjoint-bases --allowlist=.mypyignore scipy

  typetest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        py: ["3.12", "3.13", "3.14"]
        np: ["2.0", "2.1", "2.2", "2.3", "2.4", "2.5"]
        exclude:
          - py: "3.13"
            np: "2.0"
          - py: "3.14"
            np: "2.0"
          - py: "3.14"
            np: "2.1"
          - py: "3.14"
            np: "2.2"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          activate-environment: true
          python-version: ${{ matrix.py }}

      - name: install dependencies
        run: uv pip install --exact --group type numpy==${{ matrix.np }}.* .

      - name: pyrefly check tests
        run: pyrefly check --output-format=github tests

      - name: mypy tests
        run: mypy --cache-dir=/dev/null tests

      - name: basedpyright tests
        run: basedpyright tests
